name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.41.4

# Note: this workflow never passes untrusted event payloads (issue/PR
# bodies, commit messages, branch names) into run: blocks, so it's safe
# from the github-actions workflow-injection class of issues.
jobs:
  analyze:
    name: Analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install deps
        run: flutter pub get
      - name: Generate localisations
        run: flutter gen-l10n
      - name: Static analysis
        run: flutter analyze
      - name: Tests
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install deps
        run: flutter pub get
      - name: Generate localisations
        run: flutter gen-l10n
      - name: Build debug APK
        run: flutter build apk --debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: serenity-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install deps
        run: flutter pub get
      - name: Generate localisations
        run: flutter gen-l10n
      - name: Build iOS (simulator, unsigned)
        run: flutter build ios --debug --simulator --no-codesign
